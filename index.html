<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:white;
}

/* PAGE */
.page{
  display:none;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
  padding:20px;
}
.active{display:flex;}

/* TEXT */
#page1 h1{font-size:38px;}
#page1 p{font-size:29px;}

/* BUTTON BIG */
.btn{
  display:block;
  width:90%;
  max-width:400px;
  margin:12px auto;
  padding:18px;
  font-size:30px;
  font-weight:bold;
  background:#2196f3;
  border:none;
  border-radius:12px;
  color:white;
}

/* IMAGE */
img{
  width:85%;
  max-width:400px;
  border-radius:20px;
}
</style>
</head>

<body>

<!-- 🎵 BIRTHDAY MUSIC -->
<audio id="bgMusic">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b5e1a.mp3?filename=happy-birthday-254480.mp3">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h1>Hey Birthday Boy 🎂🥳</h1>
<p>I have a surprise for you 🎁</p>

<!-- 🔊 NEW BUTTON -->
<button class="btn" onclick="playMusic()">▶ Play Music</button>

<button class="btn" onclick="nextPage('page2')">Agree</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<p style="font-size:32px;">Click all options one by one</p>

<button class="btn" onclick="showWish(1)">1. English</button>
<button class="btn" onclick="showWish(2)">2. Hindi</button>
<button class="btn" onclick="showWish(3)">3. Bengali</button>
<button class="btn" onclick="showWish(4)">4. Gujarati</button>
<button class="btn" onclick="showWish(5)">5. Tamil</button>
<button class="btn" onclick="showWish(6)">6. Japanese</button>
<button class="btn" onclick="showWish(7)">7. Arabic</button>
<button class="btn" onclick="showWish(8)">8. Greek</button>
<button class="btn" onclick="showWish(9)">9. Odia</button>
<button class="btn" onclick="showWish(10)">10. Computer 😉</button>
</div>

<!-- WISH -->
<div id="wishPage" class="page">
<h1 id="wishText"></h1>
<button class="btn" onclick="nextAfterWish()">Next</button>
</div>

<!-- FINAL -->
<div id="imagePage" class="page">

<img src="https://via.placeholder.com/400">

<br><br>

<a href="https://digibouquet.vercel.app/bouquet/d61e13ba-598f-44fa-aeb3-d34625549529"
target="_blank" class="btn">
CLICK and Open Surprise 🌷🎁
</a>

<br>

<button class="btn" onclick="nextPage('page1')">End</button>
</div>

<script>

let clicked = new Set();

function nextPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

/* 🎵 FORCE PLAY */
function playMusic(){
let m=document.getElementById("bgMusic");
m.play();
}

/* WISH */
function showWish(n){
clicked.add(n);

let t="Happy Birthday 🎂🎉";
document.getElementById("wishText").innerHTML=t;

nextPage('wishPage');
}

function nextAfterWish(){
if(clicked.size===10){
nextPage('imagePage');
}else{
nextPage('page2');
}
}

</script>

</body>
</html>
