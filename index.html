    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Birthday Surprise</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:white;
    overflow:hidden;
}
.page{display:none;height:100vh;justify-content:center;align-items:center;flex-direction:column;text-align:center;}
.active{display:flex;}

.btn{
    margin:10px;
    padding:10px 20px;
    background:#2196f3;
    border:none;
    border-radius:8px;
    color:white;
}

h1{font-size:30px;}

img{
    width:80%;
    max-width:350px;
    border-radius:15px;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h1>Hey ! Birthday boy there Is a surprise for you 🥳🎉</h1>
<p>But first of all promise me you read all the slides</p>
<button class="btn" onclick="nextPage('page2')">Agree</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<p>Click on every options one after another »</p>

<button class="btn" onclick="showWish(1)">1. English</button>
<button class="btn" onclick="showWish(2)">2. Hindi</button>
<button class="btn" onclick="showWish(3)">3. Bengali</button>
<button class="btn" onclick="showWish(4)">4. Gujarati</button>
<button class="btn" onclick="showWish(5)">5. Tamil</button>
<button class="btn" onclick="showWish(6)">6. Japanese</button>
<button class="btn" onclick="showWish(7)">7. Arabic</button>
<button class="btn" onclick="showWish(8)">8. Greek</button>
<button class="btn" onclick="showWish(9)">9. Odia</button>
<button class="btn" onclick="showWish(10)">10. Computer language 😉</button>
</div>

<!-- WISH PAGE -->
<div id="wishPage" class="page">
<h1 id="wishText"></h1>
<button class="btn" onclick="nextAfterWish()">Next</button>
</div>

<!-- IMAGE PAGE -->
<div id="imagePage" class="page">
<img src="https://drive.google.com/uc?export=view&id=1u1UH9AGOvJ_ODhT-gQj51JrQMWtDmf9_" />
<br>
<button class="btn" onclick="nextPage('page1')">End</button>
</div>

<script>

let clicked = new Set();
let lastPage = "page2";

/* NAV */
function nextPage(p){
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    document.getElementById(p).classList.add('active');
}

/* SHOW WISH */
function showWish(n){
    clicked.add(n);
    lastPage = "page2";

    let t="";
    if(n==1)t="Happy Birthday 🎁🎈<br>» Dyuti Sundar Dutta";
    if(n==2)t="जन्मदिन का हार्दिक शुभकामनाएं 🎁🎈<br>» द्युति सुंदर दत्ता";
    if(n==3)t="শুভ জন্মদিন 🎁🎈<br>» দ্যুতি সুন্দর দত্ত";
    if(n==4)t="Happy Birthday 🎂🎈<br>» દ્યુતિ સુંદર દત્તા";
    if(n==5)t="Happy Birthday 🎁🎈<br>» தியுதி சுந்தர் தத்தா";
    if(n==6)t="Happy Birthday 🎈🎂<br>» デュティ・スンダル・ダッタ";
    if(n==7)t="Happy Birthday 🎈🎂<br>» ديوتي سوندار داتا";
    if(n==8)t="Happy Birthday 🎈🎂<br>» Ντιούτι Σούνταρ Ντάτα";
    if(n==9)t="Happy Birthday 🎈🎂<br>» ଦ୍ୟୁତି ସୁନ୍ଦର ଦତ୍ତ";
    if(n==10)t="Happy Birthday 🎂🎈<br>01000100 01111001 01110101";

    document.getElementById("wishText").innerHTML=t;
    nextPage('wishPage');
}

/* NEXT LOGIC */
function nextAfterWish(){
    if(clicked.size === 10){
        nextPage('imagePage'); // only after all clicked
    }else{
        nextPage(lastPage); // go back to language page
    }
}

</script>

</body>
</html>
