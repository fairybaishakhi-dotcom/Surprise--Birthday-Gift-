<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title><style>
body {
  margin: 0;
  font-family: 'Georgia', serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f4e7d3;
}

.page { display: none; }
.active { display: block; }

.card {
  background: #fff8e7;
  border: 2px solid #d4af37;
  border-radius: 12px;
  padding: 25px;
  width: 90%;
  max-width: 350px;
  text-align: center;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h2, h3 {
  margin-bottom: 15px;
}

button {
  background: #007BFF;
  color: white;
  padding: 10px;
  width: 100%;
  margin: 6px 0;
  border: none;
  border-radius: 8px;
  font-size: 15px;
}

button:active {
  transform: scale(0.95);
}

.back {
  background: gray;
}

input {
  padding: 10px;
  width: 90%;
  border-radius: 6px;
  border: 1px solid #ccc;
}
</style></head><body><!-- PAGE 1 --><div id="page1" class="page active">
<div class="card">
<h2>Hey! Birthday boy there is a surprise for you 🥳🎉</h2>
<p>But first promise me you read all the slides</p>
<button onclick="nextPage(2)">Agree</button>
</div>
</div><!-- PAGE 2 --><div id="page2" class="page">
<div class="card">
<h3>Choose your options</h3>
<p>Click one by one »</p><button onclick="showWish(1)">1. English</button> <button onclick="showWish(2)">2. Hindi</button> <button onclick="showWish(3)">3. Bengali</button> <button onclick="showWish(4)">4. Gujarati</button> <button onclick="showWish(5)">5. Tamil</button> <button onclick="showWish(6)">6. Japanese</button> <button onclick="showWish(7)">7. Arabic</button> <button onclick="showWish(8)">8. Greek</button> <button onclick="showWish(9)">9. Odia</button> <button onclick="showWish(10)">10. Computer language 😉</button>

</div>
</div><!-- WISH PAGE --><div id="wish" class="page">
<div class="card">
<h2 id="wishText"></h2>
<button class="back" onclick="nextPage(2)">⬅ Back</button>
<button id="nextBtn" style="display:none;" onclick="nextPage(3)">Next</button>
</div>
</div><!-- FINAL PAGE --><div id="page3" class="page">
<div class="card">
<h3>How is it?</h3>
<input type="text" placeholder="Write your opinion"><br><br>
<button onclick="alert('Thank you ❤️')">Send</button>
<button class="back" onclick="nextPage(2)">⬅ Back</button>
</div>
</div><script>
function nextPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
}

function showWish(num) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('wish').classList.add('active');

  let text = "";

  switch(num) {
    case 1:
      text = "Happy Birthday 🎁🎈<br>» Dyuti Sundar Dutta";
      break;
    case 2:
      text = "जन्मदिन का हार्दिक शुभकामनाएं 🎁🎈<br>» द्युति सुंदर दत्ता";
      break;
    case 3:
      text = "শুভ জন্মদিন 🎁🎈<br>» দ্যুতি সুন্দর দত্ত";
      break;
    case 4:
      text = "Happy Birthday 🎂🎈<br>» દ્યુતિ સુંદર દત્તા";
      break;
    case 5:
      text = "Happy Birthday 🎁🎈<br>» தியுதி சுந்தர் தத்தா";
      break;
    case 6:
      text = "Happy Birthday 🎈🎂<br>» デュティ・スンダル・ダッタ";
      break;
    case 7:
      text = "Happy Birthday 🎈🎂<br>» ديوتي سوندار داتا";
      break;
    case 8:
      text = "Happy Birthday 🎈🎂<br>» Ντιούτι Σούνταρ Ντάτα";
      break;
    case 9:
      text = "Happy Birthday 🎈🎂<br>» ଦ୍ୟୁତି ସୁନ୍ଦର ଦତ୍ତ";
      break;
    case 10:
      text = `Happy Birthday 🎂🎈<br>01000100 01111001 01110101 01110100 01101001`;
      document.getElementById("nextBtn").style.display = "block";
      break;
  }

  document.getElementById("wishText").innerHTML = text;
  if(num !== 10) document.getElementById("nextBtn").style.display = "none";
}
</script></body>
</html>
