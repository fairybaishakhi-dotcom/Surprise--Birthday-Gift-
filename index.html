<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background: radial-gradient(circle at top,#1a1a2e,#0f3460,#000);
    color:#fff;
    overflow:hidden;
}

/* PAGE */
.page{
    display:none;
    height:100vh;
    width:100%;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}
.active{display:flex;}

/* ROYAL CARD */
.card{
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(18px);
    padding:35px;
    border-radius:25px;
    box-shadow:0 0 60px rgba(255,215,0,0.2);
    border:1px solid rgba(255,215,0,0.3);
}

/* TITLE */
h1{
    font-family:'Playfair Display',serif;
    font-size:45px;
    color:gold;
    text-shadow:0 0 20px gold;
}

/* BUTTON */
.btn{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#d4af37,#ffd700);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.1);
}

/* BALLOONS */
.balloon{
    position:absolute;
    bottom:-100px;
    width:50px;
    height:70px;
    border-radius:50%;
    animation:float 10s infinite;
}
@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-120vh);}
}

/* GLITTER */
.sparkle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
}
@keyframes twinkle{
    0%,100%{opacity:0;}
    50%{opacity:1;}
}

/* FIREWORK */
.firework{
    position:absolute;
    width:6px;
    height:6px;
    background:gold;
    border-radius:50%;
    animation:explode 1.5s infinite;
}
@keyframes explode{
    0%{transform:scale(1);opacity:1;}
    100%{transform:scale(12);opacity:0;}
}

/* IMAGE */
img{
    width:85%;
    max-width:400px;
    border-radius:20px;
    box-shadow:0 0 25px gold;
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<!-- PAGE 1 -->
<div id="page1" class="page active">
<div class="card">
<h1 id="type"></h1>
<p>But first of all promise me you read all the slides</p>
<button class="btn" onclick="nextPage('page2')">Agree</button>
</div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
<div class="card">
<p>Click on every options one after another »</p>

<button class="btn" onclick="wish(1)">1. English</button><br>
<button class="btn" onclick="wish(2)">2. Hindi</button><br>
<button class="btn" onclick="wish(3)">3. Bengali</button><br>
<button class="btn" onclick="wish(4)">4. Gujarati</button><br>
<button class="btn" onclick="wish(5)">5. Tamil</button><br>
<button class="btn" onclick="wish(6)">6. Japanese</button><br>
<button class="btn" onclick="wish(7)">7. Arabic</button><br>
<button class="btn" onclick="wish(8)">8. Greek</button><br>
<button class="btn" onclick="wish(9)">9. Odia</button><br>
<button class="btn" onclick="wish(10)">10. Computer language 😉</button>

</div>
</div>

<!-- WISH PAGE -->
<div id="wishPage" class="page">
<div class="card">
<h1 id="wishText"></h1>
<button class="btn" onclick="nextPage('imagePage')">Next</button>
</div>
</div>

<!-- IMAGE PAGE -->
<div id="imagePage" class="page">
<div class="card">
<img src="https://drive.google.com/uc?export=view&id=1u1UH9AGOvJ_ODhT-gQj51JrQMWtDmf9_">
<button class="btn" onclick="nextPage('page1')">End</button>
</div>
</div>

<script>

/* NAVIGATION */
function nextPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.getElementById(p).classList.add('active');
}

/* TYPE EFFECT */
let txt="Hey ! Birthday boy there Is a surprise for you 🥳🎉";
let i=0;
function typing(){
if(i<txt.length){
document.getElementById("type").innerHTML+=txt.charAt(i);
i++;
setTimeout(typing,40);
}
}
typing();

/* WISHES */
function wish(n){
let t="";
if(n==1)t="Happy Birthday 🎁🎈<br>» Dyuti Sundar Dutta";
if(n==2)t="जन्मदिन का हार्दिक शुभकामनाएं 🎁🎈<br>» द्युति सुंदर दत्ता";
if(n==3)t="শুভ জন্মদিন 🎁🎈<br>» দ্যুতি সুন্দর দত্ত";
if(n==4)t="Happy Birthday 🎂🎈<br>» દ્યુતિ સુંદર દત્તા";
if(n==5)t="Happy Birthday 🎁🎈<br>» தியுதி சுந்தர் தத்தா";
if(n==6)t="Happy Birthday 🎈🎂<br>» デュティ・スンダル・ダッタ";
if(n==7)t="Happy Birthday 🎈🎂<br>» ديوتي سوندار داتا";
if(n==8)t="Happy Birthday 🎈🎂<br>» Ντιούτι Σούνταρ Ντάτα";
if(n==9)t="Happy Birthday 🎈🎂<br>» ଦ୍ୟୁତି ସୁନ୍ଦର ଦତ୍ତ";
if(n==10)t="Happy Birthday 🎂🎈<br>01000100 01111001 01110101";

document.getElementById("wishText").innerHTML=t;
nextPage('wishPage');
}

/* BALLOONS */
for(let i=0;i<30;i++){
let b=document.createElement("div");
b.className="balloon";
b.style.left=Math.random()*100+"%";
b.style.background=`hsl(${Math.random()*360},70%,60%)`;
b.style.animationDuration=(6+Math.random()*6)+"s";
document.body.appendChild(b);
}

/* GLITTER */
for(let i=0;i<60;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
document.body.appendChild(s);
}

/* FIREWORK */
for(let i=0;i<20;i++){
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"%";
f.style.top=Math.random()*100+"%";
document.body.appendChild(f);
}

</script>

</body>
</html>
