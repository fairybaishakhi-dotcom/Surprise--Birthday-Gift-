<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎉</title><style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

.page { display: none; height: 100vh; justify-content: center; align-items: center; }
.active { display: flex; }

.center { text-align: center; }

button {
  background: #007BFF;
  color: white;
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  margin-top: 20px;
}

/* BALLOONS */
.balloon {
  position: absolute;
  bottom: -100px;
  width: 40px;
  height: 50px;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-120vh); }
}

.tapBalloon {
  width: 100px;
  height: 120px;
  background: red;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-weight: bold;
  margin: auto;
  cursor: pointer;
}

.flash {
  font-size: 24px;
  animation: flicker 0.3s infinite alternate;
}

@keyframes flicker {
  from { opacity: 0.5; }
  to { opacity: 1; }
}

img {
  max-width: 100%;
  max-height: 80vh;
}

</style></head><body><!-- PAGE 1 --><div id="page1" class="page active">
<div class="center">
<div id="balloons"></div><div class="tapBalloon" onclick="reveal()">Tap me 🎈</div><h2 id="surpriseText" style="display:none;" class="flash">
Happy Birthday Dyuti Da 🎈🎂🎉
</h2><button id="next1" style="display:none;" onclick="nextPage(2)">Next</button>

</div>
</div><!-- PAGE 2 --><div id="page2" class="page">
<div class="center">
<h3>Choose your options</h3>
<button onclick="showWish(1)">1. English</button><br>
<button onclick="showWish(2)">2. Hindi</button><br>
<button onclick="showWish(3)">3. Bengali</button><br>
<button onclick="showWish(4)">4. Gujarati</button><br>
<button onclick="showWish(5)">5. Tamil</button><br>
<button onclick="showWish(6)">6. Japanese</button><br>
<button onclick="showWish(7)">7. Arabic</button><br>
<button onclick="showWish(8)">8. Greek</button><br>
<button onclick="showWish(9)">9. Odia</button><br>
<button onclick="showWish(10)">10. Computer language 😉</button>
</div>
</div><!-- WISH PAGE --><div id="wish" class="page">
<div class="center">
<h2 id="wishText"></h2>
<button onclick="nextPage(2)">⬅ Back</button>
<button id="nextBtn" style="display:none;" onclick="nextPage(3)">Next</button>
</div>
</div><!-- LAST PAGE --><div id="page3" class="page">
<div class="center">
<img src="your-image.jpg" alt="Birthday">
<br>
<button onclick="nextPage(1)">Go to Start</button>
</div>
</div><script>
function nextPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + page).classList.add('active');
}

function reveal() {
  document.getElementById('surpriseText').style.display = 'block';
  document.getElementById('next1').style.display = 'block';
}

function showWish(num) {
  nextPage('wish');
  let text = "";

  switch(num) {
    case 1: text = "Happy Birthday 🎁🎈<br>» Dyuti Sundar Dutta"; break;
    case 2: text = "जन्मदिन मुबारक 🎁🎈"; break;
    case 3: text = "শুভ জন্মদিন 🎁🎈"; break;
    case 4: text = "Happy Birthday 🎂🎈"; break;
    case 5: text = "Happy Birthday 🎁🎈"; break;
    case 6: text = "Happy Birthday 🎈🎂"; break;
    case 7: text = "Happy Birthday 🎈🎂"; break;
    case 8: text = "Happy Birthday 🎈🎂"; break;
    case 9: text = "Happy Birthday 🎈🎂"; break;
    case 10:
      text = "Happy Birthday 🎂🎈<br>01000100 01111001";
      document.getElementById("nextBtn").style.display = "block";
      break;
  }

  document.getElementById("wishText").innerHTML = text;
  if(num !== 10) document.getElementById("nextBtn").style.display = "none";
}

// create floating balloons
for(let i=0;i<15;i++){
  let b = document.createElement('div');
  b.className = 'balloon';
  b.style.left = Math.random()*100+'vw';
  b.style.background = `hsl(${Math.random()*360},70%,60%)`;
  b.style.animationDuration = (4+Math.random()*3)+'s';
  document.getElementById('balloons').appendChild(b);
}
</script></body>
</html>
